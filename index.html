<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUVIXO Tracker</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>📊 NUVIXO Study Tracker</h1>
<p>تتبع تقدمك اليومي بطريقة ذكية</p>
</header>

<section class="dashboard">

<div class="card">
<h3>Score</h3>
<h1 id="score">0</h1>
</div>

<div class="card">
<h3>Status</h3>
<h1 id="status">---</h1>
</div>

<div class="card">
<h3>Level</h3>
<h1 id="level">1</h1>
</div>

</section>

<section class="tasks">
<h2>مهام اليوم</h2>

<label><input type="checkbox"> C++</label><br>
<label><input type="checkbox"> Python</label><br>
<label><input type="checkbox"> Linux</label><br>
<label><input type="checkbox"> Networking</label><br>
<label><input type="checkbox"> Cybersecurity</label><br>

<button onclick="saveDay()">📅 حفظ اليوم</button>
</section>

<section class="chart">
<canvas id="barChart"></canvas>
</section>

<section class="history">
<h2>📅 سجل الأيام</h2>
<ul id="historyList"></ul>
</section>

<script src="app.js"></script>
</body>
  </html>
